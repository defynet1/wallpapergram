<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый проект</title>
  <style>
    :root {
      --bg: #0f1419; --surface: #1a2230; --border: #2a3545;
      --text: #e7edf4; --text-dim: #8a98a8; --accent: #4f9cf9; --bad: #ff7a7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 2rem; width: 100%; max-width: 360px;
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.4rem; }
    .sub { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 1.5rem; }
    .tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 1rem; }
    .tabs button {
      flex: 1; padding: 0.5rem; border: none; border-radius: 8px; cursor: pointer;
      background: transparent; color: var(--text-dim); font-family: inherit; font-weight: 600;
    }
    .tabs button.active { background: var(--surface); color: var(--text); }
    input {
      width: 100%; padding: 0.7rem 0.9rem; margin-bottom: 0.75rem; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit;
    }
    button.primary {
      width: 100%; padding: 0.8rem; border: none; border-radius: 10px; cursor: pointer;
      background: var(--accent); color: #06121f; font-weight: 700; font-family: inherit; font-size: 0.95rem;
    }
    .msg { font-size: 0.85rem; margin-top: 0.85rem; min-height: 1.2em; }
    .msg.err { color: var(--bad); }
    .me { display: none; }
    .me pre {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 0.85rem; overflow: auto; font-size: 0.8rem;
    }
    button.ghost {
      width: 100%; padding: 0.7rem; margin-top: 0.5rem; border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer; background: transparent; color: var(--text-dim); font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚧 Новый проект</h1>
    <div class="sub">Чистый каркас: Express + PostgreSQL + JWT. Авторизация работает — строй дальше.</div>

    <div id="authView">
      <div class="tabs">
        <button id="tabLogin" class="active" onclick="setMode('login')">Вход</button>
        <button id="tabRegister" onclick="setMode('register')">Регистрация</button>
      </div>
      <form id="authForm">
        <input id="username" placeholder="Имя пользователя" autocomplete="username">
        <input id="password" type="password" placeholder="Пароль" autocomplete="current-password">
        <button class="primary" type="submit" id="submitBtn">Войти</button>
      </form>
      <div class="msg" id="msg"></div>
    </div>

    <div class="me" id="meView">
      <div class="sub">Ты вошёл. Ответ <code>/api/me</code>:</div>
      <pre id="meData"></pre>
      <button class="ghost" onclick="logout()">Выйти</button>
    </div>
  </div>

  <script>
    let mode = 'login';

    function setMode(m) {
      mode = m;
      document.getElementById('tabLogin').classList.toggle('active', m === 'login');
      document.getElementById('tabRegister').classList.toggle('active', m === 'register');
      document.getElementById('submitBtn').textContent = m === 'login' ? 'Войти' : 'Создать аккаунт';
      setMsg('');
    }

    function setMsg(text, isErr) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg' + (isErr ? ' err' : '');
    }

    async function api(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json' };
      const token = localStorage.getItem('token');
      if (token) headers.Authorization = 'Bearer ' + token;
      const res = await fetch(path, { ...opts, headers, body: opts.body ? JSON.stringify(opts.body) : undefined });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Ошибка');
      return data;
    }

    document.getElementById('authForm').addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      try {
        const r = await api('/api/' + mode, { method: 'POST', body: { username, password } });
        localStorage.setItem('token', r.token);
        showMe();
      } catch (err) {
        setMsg(err.message, true);
      }
    });

    async function showMe() {
      try {
        const me = await api('/api/me');
        document.getElementById('authView').style.display = 'none';
        document.getElementById('meView').style.display = 'block';
        document.getElementById('meData').textContent = JSON.stringify(me, null, 2);
      } catch (err) {
        logout();
      }
    }

    function logout() {
      localStorage.removeItem('token');
      document.getElementById('meView').style.display = 'none';
      document.getElementById('authView').style.display = 'block';
      document.getElementById('password').value = '';
      setMsg('');
    }

    if (localStorage.getItem('token')) showMe();
  </script>
</body>
</html>
